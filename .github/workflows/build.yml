name: Build Godot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y wget unzip openjdk-17-jdk fontconfig

      - name: Download Godot
        run: |
          wget -O godot.zip https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip godot.zip
          chmod +x Godot_v4.6.2-stable_linux.x86_64
          mv Godot_v4.6.2-stable_linux.x86_64 /usr/local/bin/godot

      - name: Download export templates
        run: |
          mkdir -p /root/.local/share/godot/export_templates/4.6.2.stable
          wget -O /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          cd /root/.local/share/godot/export_templates/4.6.2.stable
          unzip -o /tmp/templates.tpz
          mv templates/* . && rmdir templates

      - name: Export APK
        run: |
          godot --headless --export-debug "Android" game.apk

      - uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: game.apk
