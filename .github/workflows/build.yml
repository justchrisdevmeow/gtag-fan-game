name: Build with Godot Android Docker

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-android:4.6.2
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Export APK
        run: |
          mkdir -p build
          godot --export-debug "Android" build/game.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: godot-apk
          path: build/*.apk
