name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Build Android APK
        id: build
        uses: manleydev/build-godot-action@v1.4.1
        with:
          name: gtag-fangame
          preset: Android
          debugMode: "true"
          projectDir: .
          entryPoint: /usr/bin/godot
          args: --headless --export-debug Android build/game.apk
