name: Build Godot APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.6.2
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java and keystore
        run: |
          # Set Java home (the image already has Java)
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          # Generate debug keystore
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android

      - name: Copy export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          cp -r /root/.local/share/godot/export_templates/4.6.2.stable/* ~/.local/share/godot/export_templates/4.6.2.stable/

      - name: Export APK
        run: |
          godot --headless --export-debug "Android" game.apk

      - uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: game.apk
