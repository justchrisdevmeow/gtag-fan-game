name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Build and inspect Docker image
        run: |
          git clone https://github.com/justchrisdevmeow/build-godot-action.git
          cd build-godot-action
          docker build -t test-godot .
          docker run --rm test-godot ls -la /github/home/.local/share/godot/export_templates/4.6.2.stable/ || echo "Templates missing"
    
      - name: Build Android APK
        uses: justchrisdevmeow/build-godot-action@master
        with:
          name: gtag-fangame
          preset: Android
          debugMode: "true"
          projectDir: .
          headless: "true"
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: ${{ github.workspace }}/${{ steps.build.outputs.build }}
