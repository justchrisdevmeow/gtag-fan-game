name: Build APK with Action

on:
 workflow_dispatch:
 push:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Godot APK
        uses: manleydev/godot-action@v1
        with:
          godot-version: 4.6.2-stable
          export-preset: Android
          export-path: build/game.apk
      
      - uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/*.apk
