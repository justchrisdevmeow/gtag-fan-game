name: Build Godot APK with Action

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Godot APK
        uses: manleydev/build-godot-action@v1.4.1
        with:
          godot-version: 4.6.2-stable
          export-preset: Android
          export-path: build/game.apk
          android-debug-keystore: debug.keystore
          android-keystore-password: android
          android-keystore-user: androiddebugkey
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: godot-apk
          path: build/*.apk
