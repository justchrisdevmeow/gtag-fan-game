name: Build Godot 4 Quest APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Godot 4.6.2
        run: |
          wget -O godot.zip https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip godot.zip
          chmod +x Godot_v4.6.2-stable_linux.x86_64
      
      - name: Download Android export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          wget -O /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          cd ~/.local/share/godot/export_templates/4.6.2.stable
          unzip -o /tmp/templates.tpz
          if [ -d templates ]; then
            mv templates/* .
            rmdir templates
          fi
      
      - name: Manually install Android build template to correct path
        run: |
          cd ~/.local/share/godot/export_templates/4.6.2.stable
          
          if [ -f "android_source.zip" ]; then
            rm -rf /tmp/android_template
            unzip -o android_source.zip -d /tmp/android_template/
            
            # Find and copy the android folder
            if [ -d "/tmp/android_template/android" ]; then
              mkdir -p "$GITHUB_WORKSPACE/android"
              cp -r /tmp/android_template/android/* "$GITHUB_WORKSPACE/android/"
              echo "✅ Android template installed"
            elif [ -d "/tmp/android_template/templates/android" ]; then
              mkdir -p "$GITHUB_WORKSPACE/android"
              cp -r /tmp/android_template/templates/android/* "$GITHUB_WORKSPACE/android/"
              echo "✅ Android template installed"
            else
              # Copy everything and hope for the best
              mkdir -p "$GITHUB_WORKSPACE/android"
              cp -r /tmp/android_template/* "$GITHUB_WORKSPACE/android/"
              echo "✅ Copied all contents"
            fi
            
            # Verify
            echo "=== VERIFICATION ==="
            ls -la "$GITHUB_WORKSPACE/android/"
            [ -f "$GITHUB_WORKSPACE/android/build.gradle" ] && echo "✅ build.gradle exists"
          else
            echo "❌ android_source.zip not found"
            exit 1
          fi
      
      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android
      
      - name: Fix export preset
        run: |
          sed -i 's|gradle_build/use_gradle_build=false|gradle_build/use_gradle_build=true|' export_presets.cfg
          sed -i 's|gradle_build/min_sdk=""|gradle_build/min_sdk="26"|' export_presets.cfg
          sed -i 's|gradle_build/target_sdk=""|gradle_build/target_sdk="34"|' export_presets.cfg
          sed -i 's|keystore/debug=".*"|keystore/debug="debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_password=".*"|keystore/debug_password="android"|' export_presets.cfg
          
          if ! grep -q "keystore/debug_user" export_presets.cfg; then
            sed -i '/keystore\/debug_password/a keystore/debug_user="androiddebugkey"' export_presets.cfg
          fi
          
          sed -i 's|export_path=".*"|export_path="build/game_debug.apk"|' export_presets.cfg
          
          echo "=== EXPORT PRESET ==="
          grep -E "use_gradle_build|min_sdk|target_sdk|keystore" export_presets.cfg
      
      - name: Install xvfb
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
      
      - name: Export DEBUG APK
        run: |
          mkdir -p build
          xvfb-run ./Godot_v4.6.2-stable_linux.x86_64 --headless --export-debug "Android" build/game_debug.apk 2>&1 | tee export.log
          
          if [ -f "build/game_debug.apk" ]; then
            echo "✅ APK created!"
            ls -la build/game_debug.apk
          else
            echo "❌ Export failed"
            tail -100 export.log
            exit 1
          fi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: godot4-debug-apk
          path: build/*.apk
