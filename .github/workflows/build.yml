name: Build Godot Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      
      - name: Build Android APK
        id: build
        uses: manleydev/build-godot-action@v1.4.1
        with:
          name: gtag-fangame
          preset: Android
          debugMode: "true"
          projectDir: .
          entryPoint: Godot_v4.6.2-stable_linux.x86_64
          args: --headless --export-debug Android gtag-fangame.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: ${{ github.workspace }}/gtag-fangame.apk
