name: Build APK with local Godot

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Godot
        run: |
          wget https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip Godot_v4.6.2-stable_linux.x86_64.zip
          chmod +x Godot_v4.6.2-stable_linux.x86_64
      
      - name: Install Android template (THIS WILL TAKE 10 MINUTES - BE PATIENT)
        run: |
          # This command is SILENT but WORKING
          ./Godot_v4.6.2-stable_linux.x86_64 --headless --install-android-build-template
      
      - name: Export APK
        run: |
          mkdir -p build
          ./Godot_v4.6.2-stable_linux.x86_64 --headless --export-debug "Android" build/game.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: build/*.apk
