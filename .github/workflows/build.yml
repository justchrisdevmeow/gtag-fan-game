name: Build Godot 4 Quest APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Godot 4.6.2
        run: |
          wget -O godot.zip https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip godot.zip
          chmod +x Godot_v4.6.2-stable_linux.x86_64
      
      - name: Download Android export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          wget -O /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          cd ~/.local/share/godot/export_templates/4.6.2.stable
          unzip -o /tmp/templates.tpz
          # Move files from templates/ to current directory
          if [ -d templates ]; then
            mv templates/* .
            rmdir templates
          fi
          ls -la

      - name: Generate debug keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug, O=Android, C=US" -storepass android -keypass android

      - name: Update export preset
        run: |
          sed -i 's|keystore/debug=".*"|keystore/debug="debug.keystore"|' export_presets.cfg
          sed -i 's|keystore/debug_password=".*"|keystore/debug_password="android"|' export_presets.cfg
      
      - name: Debug export with full force
        run: |
          # Run Godot with all debug flags
          ./Godot_v4.6.2-stable_linux.x86_64 --headless --verbose --debug --log-file=godot.log --export-release "Android" project.godot 2>&1 | tee full_output.log
          
          # Dump Godot's internal state
          echo "=== GODOT LOG ==="
          cat godot.log || echo "No log file"
          
          echo "=== FULL OUTPUT ==="
          cat full_output.log
          
          # Check for common errors
          echo "=== CHECKING FOR COMMON ERRORS ==="
          grep -i "error\|fail\|missing\|cannot\|invalid\|exception\|null\|crash" full_output.log || echo "No common errors found"
          
          # Check if export preset exists
          echo "=== EXPORT PRESET CHECK ==="
          ./Godot_v4.6.2-stable_linux.x86_64 --headless --list-export-presets project.godot
          
          # Validate the project
          echo "=== PROJECT VALIDATION ==="
          ./Godot_v4.6.2-stable_linux.x86_64 --headless --validate-export-preset "Android" project.godot
          
          # Check Android configuration
          echo "=== ANDROID CONFIGURATION ==="
          ./Godot_v4.6.2-stable_linux.x86_64 --headless --print-android-export-configuration project.godot
      
      - uses: actions/upload-artifact@v4
        with:
          name: godot4-apk
          path: build/*.apk
