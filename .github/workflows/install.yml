name: Install Android Template to Repo (Lightweight)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  install-template:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      
      - name: Install Godot 4.6.2
        run: |
          wget -O godot.zip https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_linux.x86_64.zip
          unzip godot.zip
          chmod +x Godot_v4.6.2-stable_linux.x86_64
      
      - name: Download Android export templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.6.2.stable
          wget -O /tmp/templates.tpz https://github.com/godotengine/godot/releases/download/4.6.2-stable/Godot_v4.6.2-stable_export_templates.tpz
          cd ~/.local/share/godot/export_templates/4.6.2.stable
          unzip -o /tmp/templates.tpz
          if [ -d templates ]; then
            mv templates/* .
            rmdir templates
          fi
      
      - name: Extract ONLY config files (skip large .aar files)
        run: |
          cd ~/.local/share/godot/export_templates/4.6.2.stable
          
          # Extract android_source.zip
          unzip -o android_source.zip -d /tmp/android_template/
          
          # Create lightweight android folder WITHOUT .aar files
          mkdir -p "$GITHUB_WORKSPACE/android"
          
          # Copy only configuration files (no large libs folder)
          cp -r /tmp/android_template/* "$GITHUB_WORKSPACE/android/"
          
          # Remove the large .aar files (they'll be downloaded by Gradle during build)
          rm -rf "$GITHUB_WORKSPACE/android/libs/"
          
          # Remove conflicting test files
          rm -rf "$GITHUB_WORKSPACE/android/src/instrumented/assets/"
          rm -rf "$GITHUB_WORKSPACE/android/src/instrumented/java/"
          rm -rf "$GITHUB_WORKSPACE/android/src/androidTestInstrumented/"
          find "$GITHUB_WORKSPACE/android" -name "*.gd" -delete 2>/dev/null || true
          find "$GITHUB_WORKSPACE/android" -name "*.tscn" -delete 2>/dev/null || true
          
          # Create .gitignore to prevent future .aar commits
          cat > "$GITHUB_WORKSPACE/android/.gitignore" << 'EOF'
          # Ignore large library files (they are downloaded by Gradle)
          /libs/
          *.aar
          *.jar
          EOF
          
          echo "✅ Lightweight Android template extracted (without .aar files)"
          echo ""
          echo "=== Total size of android folder ==="
          du -sh "$GITHUB_WORKSPACE/android"
          echo ""
          echo "=== Files in android (should be small) ==="
          find "$GITHUB_WORKSPACE/android" -type f | head -20
      
      - name: Commit lightweight android folder to repo
        run: |
          cd "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add android/
          git status
          git commit -m "Add lightweight Android build template (without .aar files) [skip ci]" || echo "No changes to commit"
          git push
